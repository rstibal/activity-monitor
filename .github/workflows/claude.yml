name: Claude Code

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Task for Claude to perform (e.g. "fix bug in is_automated_context()")'
        required: true
        type: string

jobs:
  # Automatically reviews every new or updated PR — read-only, no code changes.
  # Does NOT require the Claude GitHub App to be installed.
  auto-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            Review this pull request to the activity-monitor WordPress plugin.
            Focus on: security (SQL injection, XSS, capability checks, nonce
            verification), WordPress coding standards, correctness, and any
            regressions relative to existing behavior. Be concise — flag real
            issues, don't nitpick style unless it violates WPCS. If the PR
            looks safe to merge, say so plainly.

  # Manually triggered from the Actions tab ("Run workflow" button).
  # You type a task in the prompt box; Claude implements it and opens a PR.
  # Does NOT require the Claude GitHub App or @claude comment parsing.
  manual-task:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: ${{ github.event.inputs.prompt }}
